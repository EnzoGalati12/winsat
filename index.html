<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de XML WinSAT</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --accent: #60a5fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .upload-box {
      background: rgba(17, 24, 39, 0.9);
      border: 1px dashed var(--accent);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      margin-bottom: 24px;
    }

    .upload-box input {
      display: none;
    }

    .upload-label {
      display: inline-block;
      background: var(--accent);
      color: #08111f;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .upload-label:hover {
      filter: brightness(1.08);
    }

    .file-name {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 12;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .card h2, .card h3 {
      margin-top: 0;
    }

    .summary-card {
      grid-column: span 12;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .score-item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .score-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .score-value {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .score-badge {
      display: inline-block;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: bold;
    }

    .badge-good {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
    }

    .badge-warn {
      background: rgba(245, 158, 11, 0.15);
      color: #fcd34d;
    }

    .badge-bad {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
    }

    .cols-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .list {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      line-height: 1.7;
    }

    .muted {
      color: var(--muted);
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 26px 12px;
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    .raw-box {
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      overflow: auto;
      max-height: 280px;
      white-space: pre-wrap;
      font-size: 13px;
      color: #cbd5e1;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .header h1 {
        font-size: 26px;
      }

      .score-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Leitor de XML do WinSAT</h1>
      <p>Escolha o arquivo XML gerado pelo WinSAT e veja os resultados de forma simples. A página lê tudo localmente no seu navegador.</p>
    </div>

    <div class="upload-box">
      <label class="upload-label" for="xmlFile">Selecionar arquivo XML</label>
      <input type="file" id="xmlFile" accept=".xml,text/xml" />
      <div class="file-name" id="fileName">Nenhum arquivo selecionado</div>
    </div>

    <div class="grid" id="resultsArea">
      <div class="card summary-card">
        <div class="empty-state">
          Envie um XML do WinSAT para exibir os resultados aqui.
        </div>
      </div>
    </div>
  </div>

  <script>
    const xmlFileInput = document.getElementById("xmlFile");
    const fileName = document.getElementById("fileName");
    const resultsArea = document.getElementById("resultsArea");

    xmlFileInput.addEventListener("change", handleFileSelect);

    function handleFileSelect(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      fileName.textContent = file.name;
      const reader = new FileReader();

      reader.onload = (e) => {
        try {
          const xmlText = e.target.result;
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xmlText, "text/xml");

          if (xmlDoc.querySelector("parsererror")) {
            renderError("Não foi possível ler o XML. Verifique se o arquivo é válido.");
            return;
          }

          const data = extractWinSATData(xmlDoc, xmlText);
          renderResults(data);
        } catch (error) {
          console.error(error);
          renderError("Ocorreu um erro ao processar o arquivo.");
        }
      };

      reader.readAsText(file, "utf-8");
    }

    function getText(xmlDoc, selectors) {
      for (const selector of selectors) {
        const el = xmlDoc.querySelector(selector);
        if (el && el.textContent.trim() !== "") return el.textContent.trim();
      }
      return "N/D";
    }

    function getNumber(value) {
      if (typeof value !== "string") return null;
      const normalized = value.replace(",", ".").trim();
      const num = Number(normalized);
      return Number.isFinite(num) ? num : null;
    }

    function scoreStatus(score) {
      if (score === null) return { label: "Sem dado", className: "badge-warn" };
      if (score >= 8) return { label: "Muito bom", className: "badge-good" };
      if (score >= 6) return { label: "Mediano", className: "badge-warn" };
      return { label: "Baixo", className: "badge-bad" };
    }

    function explainScore(score, area) {
      if (score === null) return "Sem informação disponível neste arquivo.";

      const messages = {
        system: score >= 8
          ? "Desempenho geral muito bom."
          : score >= 6
            ? "Desempenho geral aceitável."
            : "Desempenho geral baixo; vale investigar.",
        cpu: score >= 8
          ? "Processador com ótimo desempenho."
          : score >= 6
            ? "Processador razoável."
            : "Processador pode estar limitando o uso.",
        memory: score >= 8
          ? "Memória com boa velocidade."
          : score >= 6
            ? "Memória em nível aceitável."
            : "Memória pode estar impactando a fluidez.",
        disk: score >= 8
          ? "Disco/SSD rápido."
          : score >= 6
            ? "Disco ok, mas não excelente."
            : "Disco pode ser um gargalo.",
        graphics: score >= 8
          ? "Parte gráfica está boa."
          : score >= 6
            ? "Parte gráfica dentro do normal."
            : "Parte gráfica abaixo do ideal.",
        gaming: score >= 8
          ? "Desempenho gráfico avançado muito bom."
          : score >= 6
            ? "Desempenho gráfico avançado mediano."
            : "Desempenho gráfico avançado baixo."
      };

      return messages[area] || "Resultado analisado.";
    }

    function extractWinSATData(xmlDoc, rawText) {
      const systemScoreText = getText(xmlDoc, ["WinSPR > SystemScore", "SystemConfig > WinSPR > SystemScore", "SystemScore"]);
      const cpuScoreText = getText(xmlDoc, ["WinSPR > CpuScore", "SystemConfig > WinSPR > CpuScore", "CpuScore"]);
      const memoryScoreText = getText(xmlDoc, ["WinSPR > MemoryScore", "SystemConfig > WinSPR > MemoryScore", "MemoryScore"]);
      const diskScoreText = getText(xmlDoc, ["WinSPR > DiskScore", "SystemConfig > WinSPR > DiskScore", "DiskScore"]);
      const graphicsScoreText = getText(xmlDoc, ["WinSPR > GraphicsScore", "SystemConfig > WinSPR > GraphicsScore", "GraphicsScore"]);
      const gamingScoreText = getText(xmlDoc, ["WinSPR > GamingScore", "SystemConfig > WinSPR > GamingScore", "GamingScore"]);

      return {
        generatedAt: getText(xmlDoc, ["WinSAT > AssessmentDateTime", "AssessmentDateTime", "SystemConfig > AssessmentDateTime"]),
        processor: getText(xmlDoc, ["SystemConfig > Processor > ProcessorName", "Processor > ProcessorName", "ProcessorName"]),
        memory: getText(xmlDoc, ["SystemConfig > Memory > TotalPhysical", "Memory > TotalPhysical", "TotalPhysical"]),
        systemScore: getNumber(systemScoreText),
        cpuScore: getNumber(cpuScoreText),
        memoryScore: getNumber(memoryScoreText),
        diskScore: getNumber(diskScoreText),
        graphicsScore: getNumber(graphicsScoreText),
        gamingScore: getNumber(gamingScoreText),
        rawText
      };
    }

    function scoreItem(label, value, areaKey) {
      const status = scoreStatus(value);
      const displayValue = value === null ? "N/D" : value.toFixed(1);

      return `
        <div class="score-item">
          <div class="score-label">${label}</div>
          <div class="score-value">${displayValue}</div>
          <span class="score-badge ${status.className}">${status.label}</span>
          <p class="muted" style="margin: 10px 0 0; line-height: 1.5;">${explainScore(value, areaKey)}</p>
        </div>
      `;
    }

    function renderResults(data) {
      const highlights = [];

      if (data.systemScore !== null && data.systemScore < 6) highlights.push("O índice geral está baixo e merece investigação.");
      if (data.cpuScore !== null && data.cpuScore < 6) highlights.push("O processador pode estar sendo um gargalo.");
      if (data.memoryScore !== null && data.memoryScore < 6) highlights.push("A memória pode estar impactando a fluidez da máquina.");
      if (data.diskScore !== null && data.diskScore < 6) highlights.push("O disco parece ser um possível ponto de lentidão.");
      if (data.graphicsScore !== null && data.graphicsScore < 6) highlights.push("O gráfico básico ficou abaixo do ideal.");

      if (highlights.length === 0) {
        highlights.push("Os scores principais não mostram gargalo evidente neste XML.");
      }

      resultsArea.innerHTML = `
        <div class="card summary-card">
          <h2>Resumo do resultado</h2>
          <div class="score-grid">
            ${scoreItem("Score geral", data.systemScore, "system")}
            ${scoreItem("CPU", data.cpuScore, "cpu")}
            ${scoreItem("Memória", data.memoryScore, "memory")}
            ${scoreItem("Disco", data.diskScore, "disk")}
            ${scoreItem("Gráfico", data.graphicsScore, "graphics")}
            ${scoreItem("Gráfico avançado", data.gamingScore, "gaming")}
          </div>
        </div>

        <div class="card">
          <h3>Informações do arquivo</h3>
          <div class="cols-2">
            <div>
              <p><strong>Data da avaliação:</strong> ${escapeHtml(data.generatedAt)}</p>
              <p><strong>Processador:</strong> ${escapeHtml(data.processor)}</p>
              <p><strong>Memória física:</strong> ${escapeHtml(data.memory)}</p>
            </div>
            <div>
              <p class="muted">Leitura simplificada do XML do WinSAT para facilitar sua análise no dia a dia.</p>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Leitura simples</h3>
          <ul class="list">
            ${highlights.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </div>

        <div class="card">
          <h3>XML bruto</h3>
          <div class="raw-box">${escapeHtml(data.rawText)}</div>
        </div>
      `;
    }

    function renderError(message) {
      resultsArea.innerHTML = `
        <div class="card summary-card">
          <div class="empty-state">${escapeHtml(message)}</div>
        </div>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
